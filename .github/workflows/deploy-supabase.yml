name: Deploy Supabase Backend

on:
  push:
    branches:
      - main
    paths:
      - "supabase/**"
      - ".github/workflows/deploy-supabase.yml"
  workflow_dispatch:

concurrency:
  group: supabase-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      SUPABASE_PROJECT_ID: ${{ vars.SUPABASE_PROJECT_ID || secrets.SUPABASE_PROJECT_ID || vars.SUPABASE_PROJECT_REF || secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_PROJECT_URL: ${{ vars.SUPABASE_PROJECT_URL || secrets.SUPABASE_PROJECT_URL }}
      PUBLIC_SITE_ORIGIN: ${{ vars.PUBLIC_SITE_ORIGIN || secrets.PUBLIC_SITE_ORIGIN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate required Supabase settings
        id: validate
        shell: bash
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN" || (echo "Missing SUPABASE_ACCESS_TOKEN" && exit 1)
          test -n "$SUPABASE_DB_PASSWORD" || (echo "Missing SUPABASE_DB_PASSWORD" && exit 1)
          test -n "$SUPABASE_DB_URL" || (echo "Missing SUPABASE_DB_URL" && exit 1)
          if [ -z "$SUPABASE_PROJECT_ID" ] && [ -n "$SUPABASE_PROJECT_URL" ]; then
            SUPABASE_PROJECT_ID="$(printf '%s' "$SUPABASE_PROJECT_URL" | sed -E 's#^.*/project/([a-z0-9]+).*$#\1#')"
          fi
          test -n "$SUPABASE_PROJECT_ID" || (echo "Missing SUPABASE_PROJECT_ID or SUPABASE_PROJECT_URL" && exit 1)
          echo "project_id=$SUPABASE_PROJECT_ID" >> "$GITHUB_OUTPUT"

      - name: Push database migrations
        run: supabase db push --db-url "$SUPABASE_DB_URL" --include-all

      - name: Sync Edge Function secrets
        shell: bash
        run: |
          if [ -n "$PUBLIC_SITE_ORIGIN" ]; then
            supabase secrets set ALLOWED_ORIGIN="$PUBLIC_SITE_ORIGIN" --project-ref "${{ steps.validate.outputs.project_id }}"
          else
            echo "PUBLIC_SITE_ORIGIN is empty. Skipping ALLOWED_ORIGIN secret sync."
          fi

      - name: Deploy Edge Function
        run: supabase functions deploy warehouse-api --project-ref "${{ steps.validate.outputs.project_id }}"
