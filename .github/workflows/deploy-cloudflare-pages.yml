name: Deploy Frontend to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cloudflare-pages-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CF_PAGES_PROJECT: ${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }}
      PUBLIC_API_BASE: ${{ vars.PUBLIC_API_BASE }}
      SUPABASE_PROJECT_ID: ${{ vars.SUPABASE_PROJECT_ID || secrets.SUPABASE_PROJECT_ID || vars.SUPABASE_PROJECT_REF || secrets.SUPABASE_PROJECT_REF }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Cloudflare Pages project name
        id: project
        shell: bash
        run: |
          if [ -n "$CF_PAGES_PROJECT" ]; then
            echo "name=$CF_PAGES_PROJECT" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REPOSITORY#*/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Write frontend runtime config
        shell: bash
        run: |
          API_BASE_VALUE="$PUBLIC_API_BASE"
          if [ -z "$API_BASE_VALUE" ] && [ -n "$SUPABASE_PROJECT_ID" ]; then
            API_BASE_VALUE="https://${SUPABASE_PROJECT_ID}.supabase.co/functions/v1/warehouse-api"
          fi
          API_BASE_VALUE="${API_BASE_VALUE:-/api}"
          cat > web/config.js <<EOF
          window.APP_CONFIG = window.APP_CONFIG || {
            API_BASE: "${API_BASE_VALUE}",
          };
          EOF

      - name: Deploy web/ to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy web
            --project-name=${{ steps.project.outputs.name }}
            --branch=${{ github.ref_name }}
