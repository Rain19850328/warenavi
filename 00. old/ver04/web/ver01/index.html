<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon-192.png" sizes="192x192">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>창고 현황판</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header class="toolbar toolbar-3rows">
      <div class="line line-top">
        <label for="rowSelect">행</label>
        <select id="rowSelect"></select>
      </div>
      <div class="line line-search">
        <input id="search" type="text" placeholder="SKU/품명/위치코드 검색…" />
      </div>
      <div class="line line-actions">
        <div class="spacer"></div>
        <button id="btnReload" class="ghost">새로고침</button>
        <button id="btnSearch">검색</button>
      </div>
    </header>

    <main id="rack" aria-live="polite"></main>

    <section id="detail" class="detail">
      <div class="detail-header">
        <h3 id="selTitle">선택된 위치: -</h3>
        <div id="selStats" class="muted">적재율: - · 용량: - · 사용: - · 남은공간: -</div>
        <div class="bar"><div id="barFill" class="bar-fill" style="width:0%"></div></div>
      </div>
      <div class="detail-body">
        <table id="tblItems">
          <thead><tr><th>SKU</th><th>상품명</th><th>수량</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
      <div class="detail-actions">
        <button id="btnInbound" class="btn">입고</button>
        <button id="btnOutbound" class="btn btn-warn">출고</button>
        <button id="btnMove" class="btn btn-primary">이동</button>
      </div>
    </section>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(console.error);
      });
    }
  </script>
  <script src="app.js"></script>
</body>
</html>
