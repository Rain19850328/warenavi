<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/sellingon_icon.ico" type="image/x-icon">
  <link rel="shortcut icon" href="icons/sellingon_icon.ico" type="image/x-icon">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <title>창고 현황판</title>
  <link rel="stylesheet" href="style.css?v=20250825-05">
</head>
<body>
  <div class="container">
    <header class="toolbar toolbar-3rows">
      <div class="line line-top">
        <label for="rowSelect">행</label>
        <select id="rowSelect"></select>
      </div>
      <div class="line line-search">
        <input id="search" type="text" placeholder="SKU/품명/위치코드 검색…" />
        <div id="searchSuggest" class="suggest" hidden></div>
      </div>
      <div class="line line-actions">
        <div class="spacer"></div>
        <button id="btnReload" class="ghost">새로고침</button>
        <button id="btnSearch">검색</button>
      </div>
    </header>

    <main id="rack" aria-live="polite"></main>

    <!-- 검색결과 리스트 (현황판 아래) -->
    <section id="searchResults" class="detail" hidden>
      <div class="detail-header">
        <h3>선택 결과</h3>
        <div class="muted">검색 결과: <span id="resultsMeta">-</span></div>
      </div>
      <div class="detail-body">
        <table id="tblResults">
          <thead><tr><th>S-Code</th><th>SKU / D-code</th><th>상품명</th><th class="r">수량</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <section id="detail" class="detail">
      <div class="detail-header">
        <h3 id="selTitle">선택된 위치: -</h3>
        <div id="selStats" class="muted">적재율: - · 용량: - · 사용: - · 남은공간: -</div>
        <div class="bar"><div id="barFill" class="bar-fill" style="width:0%"></div></div>
      </div>
      <div class="detail-body">
        <table id="tblItems">
          <thead><tr><th>SKU / D-code</th><th>상품명</th><th>수량</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
      <div class="detail-actions">
        <button id="btnInbound">입고</button>
        <button id="btnOutbound" class="warn">출고</button>
        <button id="btnMove" class="primary">이동</button>
      </div>
    </section>
  </div>

  <script src="config.js"></script>
  <script src="app.js?v=20250825-05" defer></script>
</body>
</html>
